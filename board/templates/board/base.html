{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Дошка анонімних зізнань{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'board/style.css' %}">
</head>
<body>
    <header class="site-header">
        <a href="{% url 'board:index' %}" class="logo">🕯️ Анонімні зізнання</a>
        <a href="{% url 'board:create' %}" class="btn btn-accent">Залишити зізнання</a>
    </header>

    <main class="container">
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li class="message message-{{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>Без реєстрації. Без слідів. Просто скажіть це.</p>
    </footer>
</body>
</html>
